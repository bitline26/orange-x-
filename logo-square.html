body{width:1080px;height:1080px;overflow:hidden;font-family:'Inter',sans-serif}
.b{width:1080px;height:1080px;background:#0D0D0D;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}

.glow{position:absolute;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(255,165,0,0.08) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-55%)}
.content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
/* OrangeX circle icon large */
.icon-wrap{margin-bottom:56px}
/* Wordmark + KR */
.wordmark{display:flex;align-items:center;position:relative}
.wordmark svg{height:52px}
.kr{margin-left:14px;background:#FFA500;color:#fff;font-size:18px;font-weight:900;padding:5px 12px;border-radius:6px;letter-spacing:1px;line-height:1}
/* Tagline */
.tag{margin-top:28px;font-size:16px;font-weight:700;color:rgba(255,255,255,0.2);letter-spacing:5px;text-transform:uppercase}
